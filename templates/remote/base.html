<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote Control - SyncPlay-Hub</title>
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8f9fa" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Remote">
  <link rel="manifest" href="{{ url_for('remote_pwa_manifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='pwa/remote-icon-180.png') }}">
  <!-- Favicon using emoji -->
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📱</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/remote.css') }}">
</head>
<body>
  <!-- Ping-pong pairs: active slot plays current track; passive preloads next (stitch on advance). -->
  <video id="remoteFollowVideo0" playsinline webkit-playsinline preload="none"
    style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;right:0;overflow:hidden"
    aria-hidden="true"></video>
  <video id="remoteFollowVideo1" playsinline webkit-playsinline preload="none"
    style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;right:0;overflow:hidden"
    aria-hidden="true"></video>
  <audio id="remoteFollowAudio0" playsinline preload="none" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none" aria-hidden="true"></audio>
  <audio id="remoteFollowAudio1" playsinline preload="none" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none" aria-hidden="true"></audio>
  <div class="remote-container">
    {% include 'remote/components/header.html' %}
    {% include 'remote/components/track_info.html' %}
    {% include 'remote/components/controls.html' %}
    {% include 'remote/components/volume.html' %}
  </div>

  <script>
    // Pass server variables to external JavaScript
    window.SERVER_IP = "{{ server_ip }}";
    window.SERVER_PORT = "{{ request.environ.get('SERVER_PORT', '8000') }}";
  </script>
  
  <!-- Remote Control Modules (load in dependency order) -->
  <script src="{{ url_for('static', filename='js/modules/toast-notifications.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/keep-awake.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/volume-control.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/confirm-dialog.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/remote-mic-sync.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modules/remote-control.js') }}"></script>
  
  <!-- Main entry point and coordinator -->
  <script src="{{ url_for('static', filename='js/remote.js') }}"></script>
</body>
</html>
